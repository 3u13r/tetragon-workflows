name: pr

on:
  pull_request:
    branches:
      - main
      - v*
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

env:
  LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}

jobs:
  # based on https://github.com/WordPress/performance/blob/trunk/.github/workflows/pr-validation.yml
  labels:
    name: validate labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: release-note/*
        if:
        run: |
          echo "Checking for release-note/* label"
