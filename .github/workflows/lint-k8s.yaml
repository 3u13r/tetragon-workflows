name: Lint Kubernetes CRDs
on:
  push:
    branches:
      - main
      - v*
    paths:
      - pkg/k8s/**
      - .github/workflows/lint-k8s.yaml
  pull_request:
    paths:
      - pkg/k8s/**
      - .github/workflows/lint-k8s.yaml

jobs:
  check-k8s-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
