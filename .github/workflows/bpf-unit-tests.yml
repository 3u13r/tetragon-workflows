name: BPF Unit Tests
on:
  pull_request:
    paths:
      - 'bpf/**'
      - '.github/workflows/bpf-unit-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'bpf/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04 ]
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
