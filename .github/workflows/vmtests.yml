name: vmtests
on:
  workflow_dispatch:
    inputs:
      PR-number:
        required: true
        type: string
      context-ref:
        required: true
        type: string
      SHA:
        required: true
        type: string
      base-SHA:
        required: true
        type: string
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Set initial commit status
        uses: 3u13r/tetragon-workflows/.github/actions/set-commit-status@main
        with:
          sha: ${{ inputs.SHA || github.sha }}

  build:
    needs: commit-status-start
    name: Build tetragon
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ inputs.SHA || github.ref }}-vmtest-build
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.SHA || github.sha }}
        path: go/src/github.com/cilium/tetragon/

  test:
    strategy:
        fail-fast: false
        matrix:
           kernel:
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - 'rhel8.10-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - 'bpf-next-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.18-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.12-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.6-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.1-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.15-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.10-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.4-20260720.023802'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '4.19-20260720.023802'
           group:
              - 0
    concurrency:
      group: ${{ inputs.SHA || github.ref }}-vmtest-${{ matrix.kernel }}-${{ matrix.group }}
      cancel-in-progress: true
    needs: build
    name: Test kernel ${{ matrix.kernel }} / test group ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Remove slow Azure apt mirrors
      run: |
        # The default 'azure.archive.ubuntu.com' mirrors can be really slow.
        # Removing azure.archive will pioritize the official Ubuntu mirrors.
        if [ -f /etc/apt/apt-mirrors.txt ]; then
          sudo sed -i '/azure.archive.ubuntu.com/d' /etc/apt/apt-mirrors.txt
          echo "Using mirrors:"
          cat /etc/apt/apt-mirrors.txt
        fi

  commit-status-final:
    if: ${{ always() }}
    name: Commit Status Final
    needs: [build, test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Set final commit status
        uses: 3u13r/tetragon-workflows/.github/actions/set-commit-status@main
        with:
          sha: ${{ inputs.SHA || github.sha }}
          status: ${{ needs.build.result == 'success' && needs.test.result == 'success' && 'success' || 'failure' }}
